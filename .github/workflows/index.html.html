    <style>
        /* Modern Design System Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        :root {
            --bg-body: #060814;
            --bg-surface: #111424;
            --bg-surface-hover: #1b1f38;
            --color-primary: #ff4757;
            --color-secondary: #2ed573;
            --text-main: #ffffff;
            --text-muted: #8f9cae;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Premium Sticky Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 6%;
            background: linear-gradient(to bottom, rgba(6, 8, 20, 0.95) 80%, rgba(6, 8, 20, 0));
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .logo-accent {
            color: var(--color-primary);
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: var(--transition-smooth);
        }

        nav a:hover, nav a.active {
            color: var(--text-main);
        }

        /* Integrated Search Bar */
        .search-container {
            position: relative;
            width: 260px;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px;
            background-color: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: var(--text-main);
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .search-input:focus {
            outline: none;
            background-color: var(--bg-surface);
            border-color: var(--color-primary);
            box-shadow: 0 0 15px rgba(214, 40, 40, 0.2);
        }

        /* Cinematic Hero Spotlight */
        .hero-banner {
            position: relative;
            height: 75vh;
            min-height: 500px;
            background: linear-gradient(to right, rgba(6, 8, 20, 1) 30%, rgba(6, 8, 20, 0.4) 60%, rgba(6, 8, 20, 0.8)), 
                        url('https://unsplash.com') no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding: 0 6%;
            margin-bottom: 20px;
        }

        .hero-content {
            max-width: 600px;
            z-index: 10;
        }

        .badge-premium {
            background-color: rgba(255, 71, 87, 0.2);
            color: var(--color-primary);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 16px;
        }

        .hero-content h1 {
            font-size: 48px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .hero-content p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 28px;
        }

        .btn-group {
            display: flex;
            gap: 16px;
        }

        .btn {
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: #ff2a3a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* Content Sections */
        .main-layout {
            padding: 40px 6%;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 800;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 30px;
            height: 3px;
            background-color: var(--color-primary);
            border-radius: 2px;
        }

        /* Advanced Card Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .media-card {
            background-color: var(--bg-surface);
            border-radius: 12px;
            overflow: hidden;
            transition: var(--transition-smooth);
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .media-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .thumbnail-box {
            position: relative;
            width: 100%;
            padding-top: 140%; /* Professional poster ratio */
            overflow: hidden;
        }

        .thumbnail-box img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .media-card:hover .thumbnail-box img {
            transform: scale(1.08);
        }

        .tag-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: rgba(6, 8, 20, 0.85);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            backdrop-filter: blur(4px);
        }

        .tag-free {
            color: var(--color-secondary);
            border: 1px solid var(--color-secondary);
        }

        .card-details {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: auto;
        }

        .quality-badge {
            background-color: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            nav {
                gap: 20px;
            }

            .search-container {
                width: 200px;
            }

            .hero-content h1 {
                font-size: 36px;
            }

            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-wrap: wrap;
                padding: 12px 4%;
            }

            .logo-text {
                font-size: 22px;
            }

            nav {
                order: 3;
                width: 100%;
                gap: 15px;
                margin-top: 12px;
            }

            .search-container {
                order: 2;
                width: 100%;
                margin-top: 8px;
            }

            .hero-banner {
                height: 50vh;
                padding: 0 4%;
            }

            .hero-content h1 {
                font-size: 28px;
            }

            .hero-content p {
                font-size: 14px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 13px;
            }

            .btn-group {
                flex-direction: column;
            }

            .main-layout {
                padding: 30px 4%;
            }

            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
                margin-bottom: 40px;
            }

            .section-title {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .brand {
                width: 100%;
                margin-bottom: 8px;
            }

            nav {
                width: 100%;
                gap: 10px;
                order: 3;
                font-size: 13px;
            }

            nav a {
                font-size: 13px;
            }

            .search-container {
                width: 100%;
                order: 2;
                margin-top: 8px;
            }

            .hero-banner {
                height: 40vh;
                min-height: 350px;
                padding: 0 3%;
            }

            .hero-content h1 {
                font-size: 22px;
            }

            .main-layout {
                padding: 20px 3%;
            }

            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 12px;
            }

            .section-title {
                font-size: 16px;
            }

            .card-title {
                font-size: 14px;
            }

            .card-meta {
                font-size: 11px;
            }
        }
</head>

            <div>
                <h4 style="font-size: 16px; font-weight: 700; margin-bottom: 16px;">Company</h4>
                <ul style="list-style: none;">
                    <li style="margin-bottom: 8px;"><a href="#" style="color: var(--text-muted); text-decoration: none;">About Us</a></li>
                    <li style="margin-bottom: 8px;"><a href="#" style="color: var(--text-muted); text-decoration: none;">Contact</a></li>
                    <li style="margin-bottom: 8px;"><a href="#" style="color: var(--text-muted); text-decoration: none;">Privacy Policy</a></li>
                    <li style="margin-bottom: 8px;"><a href="#" style="color: var(--text-muted); text-decoration: none;">Terms of Service</a></li>
                </ul>
            </div>
        </div>
        <div style="border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 20px; text-align: center; color: var(--text-muted); font-size: 14px;">
            <p>&copy; 2026 AniNexus. All Rights Reserved. Stream your favorite anime, cartoons, and games free!</p>
        </div>
    </footer>

    <script>
        // Search functionality
        const searchInput = document.querySelector('.search-input');
        if (searchInput) {
            searchInput.addEventListener('input', function(e) {
                const searchTerm = e.target.value.toLowerCase();
                const cards = document.querySelectorAll('.media-card');
                
                cards.forEach(card => {
                    const title = card.querySelector('.card-title').textContent.toLowerCase();
                    if (title.includes(searchTerm) || searchTerm === '') {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        }

        // Navigation active state
        const navLinks = document.querySelectorAll('nav a');
        navLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                navLinks.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Smooth scroll behavior
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Add to list functionality
        const addToListBtns = document.querySelectorAll('.btn-secondary');
        addToListBtns.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                this.textContent = '✓ Added to List';
                this.style.color = 'var(--color-secondary)';
                setTimeout(() => {
                    this.textContent = '+ Add to List';
                    this.style.color = 'white';
                }, 2000);
            });
        });
    </script>

</body>
</html>
